<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>건강운동관리사 데일리 퀴즈</title>
  <style>
    :root {
      --bg: #f4f6f2;
      --surface: #fff;
      --ink: #17201a;
      --muted: #69736c;
      --line: #dfe5dc;
      --accent: #2f6b4f;
      --accent-dark: #214f3a;
      --soft: #eef3ec;
      --cream: #faf8f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 0 0, rgba(47, 107, 79, .10), transparent 28rem),
        linear-gradient(180deg, #fbfcfa 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(760px, 100%);
      min-height: 100svh;
      margin: 0 auto;
      padding: 24px 16px 30px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand img {
      width: 44px;
      height: 44px;
      filter: drop-shadow(0 8px 18px rgba(23, 32, 26, .10));
    }
    .brand strong {
      display: block;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0;
    }
    .hero {
      padding: 22px 20px 18px;
      border: 1px solid rgba(47, 107, 79, .14);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(248,250,247,.94));
      box-shadow: 0 18px 45px rgba(23, 32, 26, .07);
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
      font-weight: 900;
    }
    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .quick a {
      min-height: 108px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(180deg, #fff 0%, #f4f8f2 100%);
      border-color: #cfdace;
    }
    .quick a:first-child {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      border-color: var(--accent-dark);
    }
    .quick a:first-child small { color: rgba(255, 255, 255, .82); }
    .quick strong {
      display: block;
      font-size: 20px;
      font-weight: 900;
    }
    .quick small {
      display: block;
      margin-top: 4px;
      text-align: left;
      line-height: 1.35;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0 18px;
    }
    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .82);
    }
    .stat strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: var(--accent-dark);
    }
    .stat small {
      display: block;
      margin-top: 2px;
      text-align: left;
    }
    ul {
      display: grid;
      gap: 9px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 70px;
      padding: 15px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, .88);
    }
    a:active { transform: scale(.99); }
    .date {
      font-size: 18px;
      font-weight: 900;
    }
    small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .row-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .badges {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .done { color: #174b35; background: #e3f1e7; }
    .review { color: #5a4522; background: #f3ead8; }
    .pending { color: #6a6f6b; background: #ecefed; }
    @media (max-width: 430px) {
      .quick { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      .quiz-row { align-items: flex-start; }
      .row-meta { align-items: flex-end; max-width: 52%; }
      .hero { padding: 18px 14px 14px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="brand">
      <img src="assets/soo2-mark.svg" alt="So02 House">
      <div><strong>So02 House DashBoard</strong></div>
    </header>
    <section class="hero">
      <h1>건강운동관리사 데일리 퀴즈</h1>
      <section class="quick" aria-label="빠른 이동">
        <a href="quizzes/quiz-2026-05-20.html?v=1779231690"><strong>오늘 문제 풀기</strong><small>2026-05-20 퀴즈 바로가기</small></a>
        <a href="wrong-note.html"><strong>오답노트 보기</strong><small>틀린 문제와 다시 볼 문제 모아보기</small></a>
      </section>
    </section>
    <section class="stats" aria-label="학습 현황">
      <div class="stat"><strong>2</strong><small>풀이완료</small></div>
      <div class="stat"><strong>2</strong><small>오답반영</small></div>
      <div class="stat"><strong>1</strong><small>대기</small></div>
    </section>
    <ul>
      <li><a class="quiz-row" href="quizzes/quiz-2026-05-20.html?v=1779231690"><span class="date">2026-05-20</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge pending">대기</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-19.html?v=1779202420"><span class="date">2026-05-19</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 8/10</span><span class="badge review">오답반영</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-18.html?v=1779202420"><span class="date">2026-05-18</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 9/10</span><span class="badge review">오답반영</span></span></span></a></li>
    </ul>
  </main>
</body>
</html>
