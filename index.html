<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>건강운동관리사 데일리 퀴즈</title>
  <style>
    :root {
      --bg: #f8f4f1;
      --surface: #fff;
      --ink: #242522;
      --muted: #6e746d;
      --line: #ddd7ca;
      --accent: #66735d;
      --accent-dark: #2f3d32;
      --sage: #e9eee4;
      --cream: #f8f4f1;
      --gold: #b89b62;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% -12%, rgba(102, 115, 93, .12), transparent 18rem),
        linear-gradient(180deg, #f8f4f1 0%, #f3eee7 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(860px, 100%);
      min-height: 100svh;
      margin: 0 auto;
      padding: 24px 18px 32px;
    }
    .dashboard-hero {
      display: grid;
      grid-template-columns: minmax(112px, 150px) 1fr;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      text-align: left;
    }
    .logo-plate {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .logo-plate img {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: multiply;
    }
    .dashboard-title {
      margin: 0;
      font-size: 37px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: 0;
      color: var(--ink);
    }
    .module {
      padding: 19px;
      border: 1px solid rgba(102, 115, 93, .20);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(248,244,241,.92) 100%);
      box-shadow: 0 14px 34px rgba(36, 37, 34, .06);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 29px;
      line-height: 1.22;
      font-weight: 950;
      color: var(--accent-dark);
      letter-spacing: 0;
    }
    .section-head span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--accent-dark);
      background: var(--sage);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 0 12px;
    }
    .stat {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, .66);
      box-shadow: 0 8px 18px rgba(36, 37, 34, .03);
    }
    .stat strong {
      display: block;
      font-size: 24px;
      font-weight: 950;
      color: var(--accent-dark);
    }
    .stat small {
      display: block;
      margin-top: 2px;
      text-align: left;
      font-size: 12px;
    }
    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }
    .quick a {
      min-height: 84px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,.84);
      border-color: rgba(102, 115, 93, .22);
      box-shadow: 0 10px 24px rgba(36, 37, 34, .045);
    }
    .quick a:first-child {
      color: #fff;
      background:
        linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      border-color: var(--accent-dark);
    }
    .quick a:first-child small { color: rgba(255, 255, 255, .82); }
    .quick strong {
      display: block;
      font-size: 20px;
      font-weight: 900;
    }
    .quick small {
      display: block;
      margin-top: 4px;
      text-align: left;
      line-height: 1.35;
      font-size: 13px;
    }
    .history-title {
      margin: 15px 0 9px;
      color: var(--accent-dark);
      font-size: 16px;
      font-weight: 950;
    }
    ul {
      display: grid;
      gap: 8px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 68px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 8px 20px rgba(36, 37, 34, .03);
    }
    a:active { transform: scale(.99); }
    .date {
      font-size: 20px;
      font-weight: 900;
    }
    small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .row-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .badges {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .done { color: #2f583a; background: #e1eddf; }
    .review { color: #6b5425; background: #f0e4ca; }
    .pending { color: #5f6661; background: #ecefed; }
    @media (max-width: 430px) {
      main { padding: 18px 12px 24px; }
      .dashboard-hero { grid-template-columns: 96px 1fr; gap: 10px; margin-bottom: 12px; }
      .dashboard-title { font-size: 27px; line-height: 1.06; }
      .module { padding: 14px 12px 12px; }
      .section-head { margin-bottom: 10px; }
      .section-head h2 { font-size: 23px; }
      .section-head span { min-height: 24px; padding: 3px 8px; font-size: 11px; }
      .stats { grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
      .stat { padding: 8px 9px; }
      .stat strong { font-size: 19px; }
      .stat small { font-size: 11px; }
      .quick { grid-template-columns: 1fr 1fr; gap: 7px; }
      .quick a { min-height: 78px; padding: 11px; }
      .quick strong { font-size: 17px; }
      .quick small { font-size: 11px; line-height: 1.25; }
      .history-title { margin: 13px 0 8px; font-size: 15px; }
      .quiz-row { align-items: flex-start; }
      .row-meta { align-items: flex-end; max-width: 52%; }
      a { min-height: 62px; padding: 12px; }
      .date { font-size: 18px; }
      small { font-size: 12px; }
      .badge { min-height: 23px; padding: 3px 7px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="dashboard-hero">
      <div class="logo-plate"><img src="assets/soo2-logo.png" alt="So02 House"></div>
      <h1 class="dashboard-title">So02 House DashBoard</h1>
    </header>
    <section class="module">
      <div class="section-head"><h2>건강운동관리사 데일리 퀴즈</h2><span>전과목 10문항</span></div>
      <section class="stats" aria-label="학습 현황">
        <div class="stat"><strong>2</strong><small>풀이완료</small></div>
        <div class="stat"><strong>2</strong><small>오답반영</small></div>
        <div class="stat"><strong>1</strong><small>미완료</small></div>
      </section>
      <section class="quick" aria-label="빠른 이동">
        <a href="quizzes/quiz-2026-05-20.html?v=1779231690"><strong>오늘 문제 풀기</strong><small>2026-05-20 퀴즈 바로가기</small></a>
        <a href="wrong-note.html"><strong>오답노트 보기</strong><small>틀린 문제와 다시 볼 문제 모아보기</small></a>
      </section>
    </section>
    <div class="history-title">학습 기록</div>
    <ul>
      <li><a class="quiz-row" href="quizzes/quiz-2026-05-20.html?v=1779231690"><span class="date">2026-05-20</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge pending">미완료</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-19.html?v=1779202420"><span class="date">2026-05-19</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 8/10</span><span class="badge review">오답반영</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-18.html?v=1779202420"><span class="date">2026-05-18</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 9/10</span><span class="badge review">오답반영</span></span></span></a></li>
    </ul>
  </main>
</body>
</html>
