<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>So02 House DashBoard</title>
  <style>
    :root {
      --bg: #f8f4f1;
      --surface: #fff;
      --ink: #242522;
      --muted: #6e746d;
      --line: #ddd7ca;
      --accent: #66735d;
      --accent-dark: #2f3d32;
      --sage: #e9eee4;
      --cream: #f8f4f1;
      --gold: #b89b62;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% -12%, rgba(102, 115, 93, .12), transparent 18rem),
        linear-gradient(180deg, #f8f4f1 0%, #f3eee7 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(860px, 100%);
      min-height: 100svh;
      margin: 0 auto;
      padding: 24px 18px 32px;
    }
    .dashboard-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 11px;
      min-height: 50px;
      margin-bottom: 14px;
      text-align: left;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }
    .logo-plate {
      flex: 0 0 auto;
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .logo-plate img {
      width: auto;
      height: 50px;
      display: block;
      mix-blend-mode: multiply;
    }
    .dashboard-title {
      margin: 0;
      display: flex;
      align-items: center;
      min-height: 50px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
      color: var(--accent-dark);
    }
    .title-label {
      display: block;
      color: var(--accent);
      font-size: 32px;
      font-weight: 950;
      letter-spacing: .01em;
      transform: translateY(1px);
    }
    .today-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid rgba(102, 115, 93, .22);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      text-decoration: none;
    }
    .module {
      padding: 16px;
      border: 1px solid rgba(102, 115, 93, .20);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(248,244,241,.92) 100%);
      box-shadow: 0 14px 34px rgba(36, 37, 34, .06);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      min-width: 0;
      font-size: 27px;
      line-height: 1.12;
      font-weight: 950;
      color: var(--accent-dark);
      letter-spacing: 0;
      white-space: nowrap;
    }
    .section-head span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--accent-dark);
      background: var(--sage);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .history-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 20px 0 10px;
      padding: 0 2px;
    }
    .history-wrap {
      width: calc(100% - 10px);
      margin: 0 auto;
    }
    .history-summary {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      padding: 4px;
      border: 1px solid rgba(102, 115, 93, .18);
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      white-space: nowrap;
    }
    .history-summary span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 27px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(248,244,241,.78);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }
    .history-summary strong {
      display: inline-block;
      font-size: 12px;
      font-weight: 950;
      color: var(--accent-dark);
    }
    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 0;
    }
    .quick a {
      min-height: 72px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,.84);
      border-color: rgba(102, 115, 93, .22);
      box-shadow: none;
    }
    .quick a:first-child {
      color: #fff;
      background:
        linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      border-color: var(--accent-dark);
    }
    .quick a:first-child small { color: rgba(255, 255, 255, .82); }
    .quick strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
    }
    .quick small {
      display: block;
      margin-top: 4px;
      text-align: left;
      line-height: 1.35;
      font-size: 12px;
    }
    .history-title {
      margin: 0;
      color: var(--accent-dark);
      font-size: 16px;
      font-weight: 950;
    }
    ul {
      display: grid;
      gap: 8px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, .86);
      box-shadow: none;
    }
    a:active { transform: scale(.99); }
    .date {
      font-size: 17px;
      font-weight: 900;
    }
    small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .row-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .badges {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .done { color: #2f583a; background: #e1eddf; }
    .review { color: #6b5425; background: #f0e4ca; }
    .pending { color: #5f6661; background: #ecefed; }
    @media (max-width: 430px) {
      main { padding: 18px 12px 24px; }
      .dashboard-hero { gap: 10px; min-height: 48px; margin-bottom: 12px; }
      .brand-lockup { gap: 10px; }
      .logo-plate img { height: 46px; }
      .dashboard-title { min-height: 46px; }
      .title-label { font-size: 29px; letter-spacing: 0; transform: translateY(1px); }
      .today-chip { min-height: 27px; padding: 4px 8px; font-size: 11px; }
      .module { padding: 13px 12px; }
      .section-head { gap: 6px; margin-bottom: 10px; }
      .section-head h2 { font-size: 17px; line-height: 1.1; }
      .section-head span { display:none; }
      .quick { grid-template-columns: 1fr 1fr; gap: 7px; }
      .quick a { min-height: 66px; padding: 10px; }
      .quick strong { font-size: 16px; }
      .quick small { font-size: 10.5px; line-height: 1.22; }
      .history-wrap { width: calc(100% - 8px); }
      .history-bar { margin: 19px 0 10px; }
      .history-title { font-size: 15px; }
      .history-summary { gap: 5px; padding: 3px; }
      .history-summary span { min-height: 25px; padding: 3px 7px; font-size: 10.5px; }
      .history-summary strong { font-size: 11.5px; }
      .quiz-row { align-items: flex-start; }
      .row-meta { align-items: flex-end; max-width: 52%; }
      a { min-height: 62px; padding: 12px; }
      .date { font-size: 18px; }
      small { font-size: 12px; }
      .badge { min-height: 23px; padding: 3px 7px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="dashboard-hero">
      <div class="brand-lockup">
        <div class="logo-plate"><img src="assets/soo2-logo.png" alt="So02 House"></div>
        <h1 class="dashboard-title"><span class="title-label">DashBoard</span></h1>
      </div>
      <a class="today-chip" href="quizzes/quiz-2026-05-20.html?v=1779252997">2026-05-20</a>
    </header>
    <section class="module">
      <div class="section-head"><h2>건강운동관리사 데일리 퀴즈</h2></div>
      <section class="quick" aria-label="빠른 이동">
        <a href="quizzes/quiz-2026-05-20.html?v=1779252997"><strong>오늘 문제 풀기</strong><small>미풀이 · 10문항 남음</small></a>
        <a href="wrong-note.html"><strong>오답노트 보기</strong><small>틀린 문제·다시 볼 문제</small></a>
      </section>
    </section>
    <div class="history-wrap">
      <div class="history-bar">
        <div class="history-title">학습 기록</div>
        <div class="history-summary" aria-label="학습 현황">
          <span>풀이완료 <strong>2</strong></span>
          <span>오답노트 <strong>2</strong></span>
          <span>미완료 <strong>1</strong></span>
        </div>
      </div>
      <ul>
        <li><a class="quiz-row" href="quizzes/quiz-2026-05-20.html?v=1779252997"><span class="date">2026-05-20</span><span class="row-meta"><span class="badges"><span class="badge pending">미완료</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-19.html?v=1779252997"><span class="date">2026-05-19</span><span class="row-meta"><span class="badges"><span class="badge done">풀이완료 8/10</span><span class="badge review">오답노트 반영</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-18.html?v=1779252997"><span class="date">2026-05-18</span><span class="row-meta"><span class="badges"><span class="badge done">풀이완료 9/10</span><span class="badge review">오답노트 반영</span></span></span></a></li>
      </ul>
    </div>
  </main>
</body>
</html>
