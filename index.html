<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>건강운동관리사 데일리 퀴즈</title>
  <style>
    :root {
      --bg: #f5f2eb;
      --surface: #fff;
      --ink: #242522;
      --muted: #6e746d;
      --line: #ded9cd;
      --accent: #66735d;
      --accent-dark: #2f3d32;
      --sage: #e9eee4;
      --cream: #f7f4ec;
      --gold: #b89b62;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 0, rgba(102, 115, 93, .18), transparent 24rem),
        linear-gradient(180deg, #fbfaf5 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(860px, 100%);
      min-height: 100svh;
      margin: 0 auto;
      padding: 30px 18px 36px;
    }
    .brand {
      display: grid;
      grid-template-columns: minmax(130px, 190px) 1fr;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
    }
    .brand img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 24px rgba(36, 37, 34, .10));
    }
    .brand strong {
      display: block;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0;
      color: var(--ink);
    }
    .hero {
      padding: 22px;
      border: 1px solid rgba(102, 115, 93, .20);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96) 0%, rgba(247,244,236,.94) 100%);
      box-shadow: 0 18px 48px rgba(36, 37, 34, .075);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 900;
      color: var(--accent-dark);
      letter-spacing: 0;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-head span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--accent-dark);
      background: var(--sage);
      font-size: 12px;
      font-weight: 900;
    }
    .quick {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 0;
    }
    .quick a {
      min-height: 112px;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,.84);
      border-color: rgba(102, 115, 93, .22);
      box-shadow: 0 10px 24px rgba(36, 37, 34, .045);
    }
    .quick a:first-child {
      color: #fff;
      background:
        linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      border-color: var(--accent-dark);
    }
    .quick a:first-child small { color: rgba(255, 255, 255, .82); }
    .quick strong {
      display: block;
      font-size: 21px;
      font-weight: 900;
    }
    .quick small {
      display: block;
      margin-top: 4px;
      text-align: left;
      line-height: 1.35;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 16px 0 20px;
    }
    .stat {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, .78);
      box-shadow: 0 8px 20px rgba(36, 37, 34, .035);
    }
    .stat strong {
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: var(--accent-dark);
    }
    .stat small {
      display: block;
      margin-top: 2px;
      text-align: left;
      font-size: 12px;
    }
    ul {
      display: grid;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 76px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 8px 20px rgba(36, 37, 34, .03);
    }
    a:active { transform: scale(.99); }
    .date {
      font-size: 21px;
      font-weight: 900;
    }
    small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .row-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .badges {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .done { color: #2f583a; background: #e1eddf; }
    .review { color: #6b5425; background: #f0e4ca; }
    .pending { color: #5f6661; background: #ecefed; }
    @media (max-width: 430px) {
      .quick { grid-template-columns: 1fr; }
      main { padding: 22px 14px 28px; }
      .brand { grid-template-columns: 118px 1fr; gap: 12px; align-items: center; }
      .brand strong { font-size: 24px; }
      .stats { grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
      .stat { padding: 10px; }
      .stat strong { font-size: 20px; }
      .quiz-row { align-items: flex-start; }
      .row-meta { align-items: flex-end; max-width: 52%; }
      .hero { padding: 20px 15px 15px; }
      h1 { font-size: 19px; }
      .quick strong { font-size: 21px; }
    }
  </style>
</head>

    <header class="brand">

    <section class="hero">

      <section class="quick" aria-label="빠른 이동">

        <a href="wrong-note.html"><strong>오답노트 보기</strong><small>틀린 문제와 다시 볼 문제 모아보기</small></a>
      </section>
    </section>

      <div class="stat"><strong>2</strong><small>오답반영</small></div>
      <div class="stat"><strong>1</strong><small>미완료</small></div>

    <ul>
      <li><a class="quiz-row" href="quizzes/quiz-2026-05-20.html?v=1779231690"><span class="date">2026-05-20</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge pending">미완료</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-19.html?v=1779202420"><span class="date">2026-05-19</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 8/10</span><span class="badge review">오답반영</span></span></span></a></li><li><a class="quiz-row" href="quizzes/quiz-2026-05-18.html?v=1779202420"><span class="date">2026-05-18</span><span class="row-meta"><small>전과목 10문항</small><span class="badges"><span class="badge done">풀이완료 9/10</span><span class="badge review">오답반영</span></span></span></a></li>
    </ul>
  </main>
